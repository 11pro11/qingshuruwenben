<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>神人程序 · AI版</title>
    <style>
        * { box-sizing: border-box; }

        body {
            background: #1a2a2a;
            font-family: 'Segoe UI', 'Noto Sans CJK SC', system-ui, monospace;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }

        .chat-container {
            width: 100%;
            max-width: 800px;
            height: 85vh;
            background: #fef3e0;
            border-radius: 2rem;
            box-shadow: 0 20px 35px rgba(0,0,0,0.3);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .chat-header {
            background: #2c4238;
            padding: 1rem 1.5rem;
            color: #fae67a;
            border-bottom: 3px solid #e0b35a;
        }
        .chat-header h2 {
            margin: 0;
            font-size: 1.4rem;
            display: flex;
            align-items: center;
            gap: 0.6rem;
        }
        .chat-header h2::before {
            content: "🤖";
            font-size: 1.8rem;
        }
        .status {
            font-size: 0.7rem;
            background: #1e2e28;
            display: inline-block;
            padding: 0.2rem 0.7rem;
            border-radius: 20px;
            margin-left: 1rem;
            font-family: monospace;
        }

        .messages {
            flex: 1;
            overflow-y: auto;
            padding: 1.2rem;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .message {
            display: flex;
            max-width: 92%;
        }
        .user {
            align-self: flex-end;
        }
        .bot {
            align-self: flex-start;
        }
        .bubble {
            padding: 8px 16px;
            border-radius: 1.5rem;
            line-height: 1.45;
            white-space: pre-wrap;
            word-break: break-word;
            font-size: 0.95rem;
        }
        .user .bubble {
            background: #2d6a5e;
            color: white;
            border-bottom-right-radius: 5px;
        }
        .bot .bubble {
            background: white;
            border: 1px solid #e2cfaa;
            color: #2d2a1f;
            border-bottom-left-radius: 5px;
        }
        .empty-line {
            height: 0.6rem;
        }

        .input-area {
            background: #e7d7b0;
            padding: 0.9rem 1.2rem;
            display: flex;
            gap: 12px;
            border-top: 2px solid #ccae6e;
        }
        .input-area input {
            flex: 1;
            background: #fffcf0;
            border: 2px solid #c2a05b;
            border-radius: 3rem;
            padding: 12px 18px;
            font-size: 0.9rem;
            outline: none;
            font-family: inherit;
        }
        .input-area input:focus {
            border-color: #9b6f3c;
        }
        .input-area button {
            background: #5b4526;
            border: none;
            color: #ffe5b4;
            font-weight: bold;
            padding: 0 22px;
            border-radius: 3rem;
            font-family: monospace;
            cursor: pointer;
            transition: 0.05s linear;
        }
        .input-area button:active {
            transform: scale(0.96);
        }
        button:disabled, input:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }
    </style>
</head>
<body>
<div class="chat-container">
    <div class="chat-header">
        <h2>神人程序 · AI 智能版<span class="status">AI在线</span></h2>
        <div style="font-size:0.7rem;">输入「燃尽」终止 | 混合规则+AI</div>
    </div>
    <div class="messages" id="msgArea">
        <div class="message bot">
            <div class="bubble">咕咕嘎嘎~ 我是AI增强版凑企鹅，随便聊！</div>
        </div>
    </div>
    <div class="input-area">

        <button id="sendBtn">发送</button>
    </div>

    function addMsg(text, role, isBlank = false) {
        const div = document.createElement('div');
        div.className = `message ${role}`;
        if (isBlank) {
            div.classList.add('empty-line');
            div.style.height = '0.6rem';
            div.innerHTML = '';
        } else {
            const bubble = document.createElement('div');
            bubble.className = 'bubble';
            bubble.textContent = text;
            div.appendChild(bubble);
        }
        msgContainer.appendChild(div);
        msgContainer.scrollTop = msgContainer.scrollHeight;
    }

    // 打字机效果：逐字显示文本，模拟原有延迟感
    async function typeWriter(text, delayMs = 30) {
        const div = document.createElement('div');
        div.className = 'message bot';
        const bubble = document.createElement('div');
        bubble.className = 'bubble';
        div.appendChild(bubble);
        msgContainer.appendChild(div);
        msgContainer.scrollTop = msgContainer.scrollHeight;

        for (let i = 0; i < text.length; i++) {
            bubble.textContent += text[i];
            await sleep(delayMs);
            msgContainer.scrollTop = msgContainer.scrollHeight;
        }
        return;
    }

        }

    // 执行规则库的步骤（沿用原来的 runSteps 逻辑）
    async function runRuleSteps(lines) {
        for (const step of lines) {
            if (!active) break;
            if (step.text !== undefined && step.text !== '') {
                addMsg(step.text, 'bot');
            } else if (step.isEmpty) {
                addMsg('', 'bot', true);
            }
            if (step.delay > 0) await sleep(step.delay);

        sendBtn.disabled = true;
        inputEl.disabled = true;

        // 先显示“思考中……”，模拟原版开头
        addMsg("思考中……", "bot");
        addMsg('', 'bot', true); // 空行

        // 1. 先尝试规则库
        const { matched, lines } = applyRuleEngine(raw);
        if (matched) {
            await runRuleSteps(lines);
        } else {
            // 2. 规则没命中，调用AI
            // 可选: 在AI返回前加个小延迟，让“思考中……”停留片刻
            await sleep(800);
            // 移除刚才的“思考中……”? 保留也行，但为了美观，把“思考中……”替换或保留无所谓
            // 简单直接调用AI并使用打字机输出
            const aiReply = await callAI(raw);
            // 移除最后一条“思考中……”消息？为了整洁，可以删除，但为了简单，直接输出新消息，保留思考痕迹也可以
            // 我们用打字机显示AI的回复
            await typeWriter(aiReply, 25);
            addMsg('', 'bot', true); // 空行
        }

        // 燃尽终止
        if (raw === '燃尽') {
            active = false;
            addMsg("🔥 已燃尽。刷新页面可重新运行。", "bot");
            sendBtn.disabled = true;
            inputEl.disabled = true;
            processing = false;
            return;
        }

        processing = false;
        sendBtn.disabled = false;
        inputEl.disabled = false;
        inputEl.focus();
    }

    // 绑定事件
    sendBtn.addEventListener('click', onUserMessage);
    inputEl.addEventListener('keypress', e => {
        if (e.key === 'Enter' && !processing && active) {
            e.preventDefault();
            onUserMessage();
        }
    });
    inputEl.focus();
</script>
</body>
</html>
